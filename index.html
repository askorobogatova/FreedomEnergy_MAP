<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Freedom Energy UA — Карта об'єктів СЕС</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: 'Onest', system-ui, -apple-system, sans-serif; background: #f4f5f3; color: #1c2420; overflow: hidden; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: #cfd6cf; border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
    
    .leaflet-container { background: #e8ece8; font-family: inherit; }
    .leaflet-tooltip.ses-tt { background: #1c2420; color: #fff; border: 0; border-radius: 9px; box-shadow: 0 6px 18px rgba(0,0,0,.28); padding: 8px 11px; font-size: 12.5px; line-height: 1.4; font-family: 'Onest', sans-serif; }
    .leaflet-tooltip.ses-tt:before { display: none; }
    
    .ses-cluster { display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: 600; color: #fff; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    
    @keyframes seppulse { 0% { transform: scale(1); opacity: .6; } 70% { transform: scale(2.2); opacity: 0; } 100% { opacity: 0; } }
    @keyframes taskBlink { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    
    .filter-select { width: 100%; padding: 8px 10px; border: 1px solid #dde1da; border-radius: 9px; font-family: inherit; font-size: 13px; background: #fafbfa; color: #1c2420; outline: none; cursor: pointer; }
    .chip-btn { display: flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 9px; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid #e9ebe7; background: #f4f5f3; color: #9aa29a; }
  </style>
</head>
<body>

<div style="height: 100vh; display: flex; flex-flex-direction: column; flex-direction: column;">
  <header style="display: flex; align-items: center; gap: 18px; padding: 0 20px; height: 62px; background: #fff; border-bottom: 1px solid #e3e6e1; flex-shrink: 0; z-index: 1000;">
    <div style="display: flex; align-items: center; gap: 11px; flex-shrink: 0;">
      <div style="width: 34px; height: 34px; border-radius: 9px; background: #1f8a5b; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 15px;">☀</div>
      <div style="display: flex; flex-direction: column; line-height: 1.1;">
        <span style="font-size: 9.5px; letter-spacing: .2em; text-transform: uppercase; color: #8a938b;">Freedom Energy UA</span>
        <span style="font-size: 16px; font-weight: 700;">Карта об'єктів СЕС</span>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 8px; margin-left: 8px; flex-wrap: wrap;">
      <button type="button" id="layer-realized" class="chip-btn" onclick="toggleLayer('realized')"><span style="width: 10px; height: 10px; border-radius: 50%; background: #1f8a5b;"></span>Реалізовані <b id="cnt-realized">0</b></button>
      <button type="button" id="layer-leads" class="chip-btn" onclick="toggleLayer('leads')"><span style="width: 10px; height: 10px; border-radius: 50%; background: #e0871e;"></span>Потенційні <b id="cnt-leads">0</b></button>
      <button type="button" id="temp-warm" class="chip-btn" style="font-size: 11.5px;" onclick="toggleTemp('warm')"><span style="width: 8px; height: 8px; border-radius: 50%; background: #e0871e;"></span>Теплі</button>
      <button type="button" id="temp-cold" class="chip-btn" style="font-size: 11.5px;" onclick="toggleTemp('cold')"><span style="width: 8px; height: 8px; border-radius: 50%; background: #3a78d6;"></span>Холодні</button>
      <button type="button" id="temp-raw" class="chip-btn" style="font-size: 11.5px;" onclick="toggleTemp('raw')"><span style="width: 8px; height: 8px; border-radius: 50%; background: #8a8079;"></span>Необроблені</button>
    </div>

    <div style="margin-left: auto; display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
      <button type="button" onclick="toggleAnalytics()" style="display: flex; align-items: center; gap: 7px; padding: 8px 13px; border: 1px solid #1f8a5b; background: #e8f3ee; color: #1f8a5b; border-radius: 9px; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;">📊 Аналітика</button>
      <div style="display: flex; align-items: center; gap: 7px; font-size: 12px; color: #687069;">
        <span id="src-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #c9a227;"></span><span id="src-text">Завантаження...</span>
      </div>
      <button type="button" onclick="connectSheet()" style="display: flex; align-items: center; gap: 7px; padding: 8px 13px; border: 1px solid #d9ddd6; background: #fff; border-radius: 9px; font-family: inherit; font-size: 12.5px; font-weight: 600; color: #1c2420; cursor: pointer;">Google Sheets</button>
    </div>
  </header>

  <div style="flex: 1; display: flex; min-height: 0;">
    
    <aside style="width: 368px; flex-shrink: 0; background: #fff; border-right: 1px solid #e3e6e1; display: flex; flex-direction: column; min-height: 0;">
      <div style="padding: 14px 16px 12px; border-bottom: 1px solid #eef0ec; flex-shrink: 0;">
        <div style="position: relative;">
          <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9aa29a; font-size: 14px;">⌕</span>
          <input id="search-input" oninput="onSearchChange(this.value)" placeholder="Пошук: назва, телефон, нас. пункт" style="width: 100%; padding: 11px 12px 11px 32px; border: 1px solid #dde1da; border-radius: 10px; font-family: inherit; font-size: 13.5px; outline: none; background: #fafbfa; color: #1c2420;">
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 11px;">
          <button type="button" onclick="toggleFiltersPanel()" style="display: flex; align-items: center; gap: 6px; background: none; border: 0; padding: 0; font-family: inherit; font-size: 12.5px; font-weight: 600; color: #1c2420; cursor: pointer;">Фільтри <span id="filter-chevron" style="color: #1f8a5b;">▾</span></button>
          <button type="button" onclick="resetAllFilters()" style="background: none; border: 0; padding: 0; font-family: inherit; font-size: 12px; color: #8a938b; cursor: pointer; text-decoration: underline;">Скинути</button>
        </div>
      </div>

      <div id="filters-panel" style="padding: 12px 16px; border-bottom: 1px solid #eef0ec; flex-shrink: 0; max-height: 42vh; overflow-y: auto; display: flex; flex-direction: column; gap: 11px;">
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Область</span>
          <select id="f-region" class="filter-select" onchange="setFilter('region', this.value)"><option value="">Усі області</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Район</span>
          <select id="f-district" class="filter-select" onchange="setFilter('district', this.value)"><option value="">Усі райони</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Населений пункт</span>
          <select id="f-settlement" class="filter-select" onchange="setFilter('settlement', this.value)"><option value="">Усі пункти</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Тип клієнта</span>
          <select id="f-clientType" class="filter-select" onchange="setFilter('clientType', this.value)"><option value="">Усі типу</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Джерело ліда</span>
          <select id="f-leadSource" class="filter-select" onchange="setFilter('leadSource', this.value)"><option value="">Усі джерела</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Регіональний менеджер</span>
          <select id="f-regManager" class="filter-select" onchange="setFilter('regManager', this.value)"><option value="">Усі</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Менеджер продажу</span>
          <select id="f-salesManager" class="filter-select" onchange="setFilter('salesManager', this.value)"><option value="">Усі</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Тип станції</span>
          <select id="f-stationType" class="filter-select" onchange="setFilter('stationType', this.value)"><option value="">Усі типи</option></select>
        </label>
        <label style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Статус</span>
          <select id="f-status" class="filter-select" onchange="setFilter('status', this.value)"><option value="">Усі статуси</option></select>
        </label>
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <span style="font-size: 10.5px; text-transform: uppercase; color: #8a938b; font-weight: 600;">Потужність СЕС, кВт</span>
          <div style="display: flex; gap: 8px;">
            <input id="f-powerMin" oninput="setFilter('powerMin', this.value)" inputmode="numeric" placeholder="від" style="width: 100%; padding: 8px 10px; border: 1px solid #dde1da; border-radius: 9px; font-family: inherit; font-size: 13px; background: #fafbfa; outline: none;">
            <input id="f-powerMax" oninput="setFilter('powerMax', this.value)" inputmode="numeric" placeholder="до" style="width: 100%; padding: 8px 10px; border: 1px solid #dde1da; border-radius: 9px; font-family: inherit; font-size: 13px; background: #fafbfa; outline: none;">
          </div>
        </div>
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 6px; flex-shrink: 0;">
        <span style="font-size: 12.5px; font-weight: 700;">Об'єкти</span>
        <span id="items-counter" style="font-size: 12px; color: #8a938b;">0 зі 0</span>
      </div>

      <div id="object-list" style="flex: 1; min-height: 0; overflow-y: auto; padding: 0 10px 12px;"></div>
    </aside>

    <main style="flex: 1; min-width: 0; position: relative;">
      <div id="map" style="position: absolute; inset: 0;"></div>

      <div style="position: absolute; left: 14px; bottom: 14px; z-index: 500; background: rgba(255,255,255,.94); border: 1px solid #e3e6e1; border-radius: 11px; padding: 11px 13px; box-shadow: 0 4px 14px rgba(0,0,0,.08); font-size: 11.5px;">
        <div style="font-weight: 700; margin-bottom: 7px; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #687069;">Легенда</div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
          <div style="display: flex; align-items: center; gap: 8px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #1f8a5b; border: 2px solid #fff; box-shadow: 0 0 0 1px #cdd3cc;"></span>Реалізована СЕС</div>
          <div style="display: flex; align-items: center; gap: 8px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #e0871e; border: 2px solid #fff; box-shadow: 0 0 0 1px #cdd3cc;"></span>Теплий лід</div>
          <div style="display: flex; align-items: center; gap: 8px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #3a78d6; border: 2px solid #fff; box-shadow: 0 0 0 1px #cdd3cc;"></span>Холодний лід</div>
          <div style="display: flex; align-items: center; gap: 8px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: #8a8079; border: 2px solid #fff; box-shadow: 0 0 0 1px #cdd3cc;"></span>Необроблений лід</div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;"><span style="width: 11px; height: 11px; border-radius: 50%; background: transparent; border: 2px solid #ef4444;"></span>Прострочена задача</div>
        </div>
      </div>

      <div id="details-card" style="display: none; position: absolute; top: 0; right: 0; height: 100%; width: 384px; max-width: 90%; z-index: 600; background: #fff; border-left: 1px solid #e3e6e1; box-shadow: -12px 0 32px -16px rgba(0,0,0,.28); flex-direction: column;"></div>

      <div id="analytics-panel" style="display: none; position: absolute; top: 0; left: 0; height: 100%; width: 384px; max-width: 90%; z-index: 600; background: #fff; border-right: 1px solid #e3e6e1; box-shadow: 12px 0 32px -16px rgba(0,0,0,.28); flex-direction: column;"></div>
    </main>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
  const state = {
    search: '',
    showFilters: true,
    showAnalytics: false,
    activeId: null,
    layers: { realized: true, leads: true },
    temps: { cold: true, warm: true, raw: true },
    filters: { region: '', district: '', settlement: '', clientType: '', leadSource: '', regManager: '', salesManager: '', stationType: '', status: '', powerMin: '', powerMax: '' }
  };

  const COLORS = { realized: '#1f8a5b', cold: '#3a78d6', warm: '#e0871e', raw: '#8a8079' };
  let allData = [];
  let map, cRealized, cLeads;
  const SHEET_DEFAULT = 'https://docs.google.com/spreadsheets/d/10q6PbI_xLmljOq22_LmwoT3ASBum1AhMAn3BjjGXEmw/edit';

  window.onload = function() {
    initMap();
    loadData();
    updateButtonStyles();
  };

  function initMap() {
    map = L.map('map', { zoomControl: true, minZoom: 5, maxZoom: 18 }).setView([48.7, 31.4], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap, © CARTO'
    }).addTo(map);

    cRealized = L.markerClusterGroup({ maxClusterRadius: 55, iconCreateFunction: clusterIcon('#1f8a5b') }).addTo(map);
    cLeads = L.markerClusterGroup({ maxClusterRadius: 55, iconCreateFunction: clusterIcon('#c77a1a') }).addTo(map);
  }

  function clusterIcon(color) {
    return (cluster) => {
      const n = cluster.getChildCount();
      const s = n < 10 ? 34 : n < 50 ? 42 : 50;
      return L.divIcon({
        html: `<div class="ses-cluster" style="width:${s}px;height:${s}px;background:${color};font-size:${n < 100 ? 14 : 12}px">${n}</div>`,
        className: '', iconSize: [s, s]
      });
    };
  }

  async function loadData() {
    const url = (localStorage.getItem('ses_gsheet_url') || SHEET_DEFAULT).trim();
    const srcText = document.getElementById('src-text');
    const srcDot = document.getElementById('src-dot');
    
    try {
      let csvUrl = url;
      const m = url.match(/\/spreadsheets\/d\/([\w-]+)/);
      if (m) {
        const gid = (url.match(/[?&#]gid=(\d+)/) || [])[1];
        csvUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv` + (gid ? `&gid=${gid}` : '');
      }
      
      const res = await fetch(csvUrl);
      const text = await res.text();
      allData = parseCSV(text);
      
      srcText.innerText = url === SHEET_DEFAULT ? "Демо-дані" : "Google Sheets";
      srcDot.style.background = "#1f8a5b";
      
      initDropdownOptions();
      render();
    } catch (e) {
      console.error(e);
      srcText.innerText = "Помилка завантаження";
      srcDot.style.background = "#ef4444";
    }
  }

  // Розумний парсер з автоматичним визначенням роздільника (кома чи крапка з комою)
// Розумний парсер з автоматичним визначенням роздільника та гнучким пошуком заголовків
  function parseCSV(text) {
    const lines = text.split('\n');
    if (lines.length === 0) return [];
    
    const firstLine = lines[0];
    const commas = (firstLine.match(/,/g) || []).length;
    const semicolons = (firstLine.match(/;/g) || []).length;
    const d = semicolons > commas ? ';' : ',';

    const rows = []; let row = [], cell = '', q = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (q) { if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else q = false; } else cell += ch; }
      else { if (ch === '"') q = true; else if (ch === d) { row.push(cell); cell = ''; } else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; } else if (ch === '\r') {} else cell += ch; }
    }
    if (cell.length || row.length) { row.push(cell); rows.push(row); }
    if (rows.length < 2) return [];

    // Приводимо всі заголовки до нижнього регістру для точного порівняння
    const head = rows[0].map(h => h.trim().toLowerCase());
    const col = (...names) => { 
      for (const n of names) { 
        const i = head.findIndex(h => h.includes(n.toLowerCase())); 
        if (i >= 0) return i; 
      } 
      return -1; 
    };
    
    // Розширений мапінг заголовків (шукає будь-які згадки або скорочення)
    const ci = {
      name: col('суб', 'назва', 'покупець', 'компан', 'клієнт', 'фіо'),
      contact: col('контакт', 'власник', 'особа', 'піб'), 
      phone: col('телефон', 'тел', 'номер'),
      clientType: col('тип клієнт', 'тип', 'категор'), 
      leadSource: col('джерело', 'звідки', 'source'),
      settlement: col('населен', 'пункт', 'місто', 'село', 'смт'), 
      region: col('област', 'регіон', 'обл'), 
      district: col('район', 'р-н'),
      address: col('адрес', 'вулиця'), 
      power: col('потужн', 'квт', 'power', 'w'), 
      type: col('тип станц', 'тип сес', 'вид станц'),
      sale: col('дата прод', 'продаж', 'договір'), 
      inst: col('дата монтаж', 'монтаж', 'введен'),
      reg: col('регіональн', 'рег', 'рм'), 
      sales: col('менеджер прод', 'менеджер з продаж', 'менеджер', 'відповідальн'),
      status: col('статус проєкт', 'статус проект', 'статус сес', 'статус', 'етап'), 
      sum: col('сума', 'вартість', 'ціна'), 
      notes: col('приміт', 'комент', 'інфо'),
      base: col('база', 'шар', 'тип об', 'карта'), 
      temp: col('темпер', 'лід тип', 'тип ліда', 'теплий', 'холодний', 'маркер'),
      crm: col('crm', 'посилан', 'лінк', 'link'), 
      overdue: col('прострочен', 'задач', 'увага', 'task'),
      lat: col('широт', 'lat', 'y'), 
      lon: col('довгот', 'lon', 'lng', 'x')
    };

    const out = [];
    for (let r = 1; r < rows.length; r++) {
      const c = rows[r]; 
      // Якщо рядок порожній або немає назви — пропускаємо
      if (!c || c.length === 0 || (ci.name >= 0 && !c[ci.name])) continue;
      
      const baseVal = (ci.base >= 0 && c[ci.base]) ? c[ci.base].toLowerCase() : '';
      const tempVal = (ci.temp >= 0 && c[ci.temp]) ? c[ci.temp].toLowerCase() : '';
      
      // Логіка визначення Реалізований / Потенційний (Лід)
      const isLead = baseVal.includes('потенц') || baseVal.includes('лід') || 
                     tempVal.includes('хол') || tempVal.includes('тепл') || tempVal.includes('необроб') ||
                     (ci.status >= 0 && String(c[ci.status]).toLowerCase().includes('лід'));
                     
      let leadTemp = 'raw';
      if (isLead) {
        if (tempVal.includes('тепл') || tempVal.includes('warm')) leadTemp = 'warm';
        else if (tempVal.includes('хол') || tempVal.includes('cold')) leadTemp = 'cold';
        else leadTemp = 'raw';
      }
      
      const overdueVal = (ci.overdue >= 0 && c[ci.overdue]) ? c[ci.overdue].toLowerCase() : '';
      const isOverdue = overdueVal === 'так' || overdueVal === '1' || overdueVal === '+' || overdueVal.includes('прос');

      // Функція безпечного витягування тексту зі стовпчика
      const txt = (idx) => (idx >= 0 && c[idx]) ? c[idx].trim() : '';

      out.push({
        id: (isLead ? 'L' : 'R') + r,
        kind: isLead ? 'lead' : 'realized', 
        leadTemp,
        name: txt(ci.name) || `Об'єкт №${r}`, 
        contact: txt(ci.contact) || '—',
        phone: txt(ci.phone), 
        settlement: txt(ci.settlement),
        region: txt(ci.region), 
        district: txt(ci.district),
        clientType: txt(ci.clientType), 
        leadSource: txt(ci.leadSource),
        address: txt(ci.address), 
        powerKw: parseFloat((txt(ci.power) || '0').replace(/[^\d.]/g, '').replace(',', '.')) || 0,
        stationType: txt(ci.type), 
        saleDate: txt(ci.sale),
        installDate: txt(ci.inst), 
        regionalManager: txt(ci.reg),
        salesManager: txt(ci.sales), 
        status: txt(ci.status) || (isLead ? 'Лід' : 'Реалізовано'),
        contractSum: parseFloat((txt(ci.sum) || '0').replace(/[^\d.]/g, '').replace(',', '.')) || 0,
        notes: txt(ci.notes), 
        crmLink: txt(ci.crm), 
        isOverdue,
        lat: ci.lat >= 0 ? parseFloat(String(c[ci.lat]).replace(',', '.')) : null,
        lon: ci.lon >= 0 ? parseFloat(String(c[ci.lon]).replace(',', '.')) : null
      });
    }
    
    // Фільтруємо лише ті об'єкти, які мають координати, щоб вони не ламали карту
    return out.filter(o => o.lat && !isNaN(o.lat) && o.lon && !isNaN(o.lon));
  }

  function getUniqVals(key) {
    const set = new Set();
    allData.forEach(o => { if (o[key]) set.add(o[key]); });
    return [...set].sort((a, b) => String(a).localeCompare(String(b), 'uk'));
  }

  function initDropdownOptions() {
    const mapping = {
      'f-region': 'region', 'f-district': 'district', 'f-settlement': 'settlement',
      'f-clientType': 'clientType', 'f-leadSource': 'leadSource', 'f-regManager': 'regionalManager',
      'f-salesManager': 'salesManager', 'f-stationType': 'stationType', 'f-status': 'status'
    };
    for (let id in mapping) {
      const el = document.getElementById(id); if (!el) continue;
      const vals = getUniqVals(mapping[id]);
      let html = `<option value="">${el.options[0].text}</option>`;
      vals.forEach(v => { html += `<option value="${v}">${v}</option>`; });
      el.innerHTML = html;
    }
  }

  function getFiltered() {
    const q = state.search.trim().toLowerCase();
    const pmin = state.filters.powerMin ? +state.filters.powerMin : null;
    const pmax = state.filters.powerMax ? +state.filters.powerMax : null;

    return allData.filter(o => {
      if (o.kind === 'realized' && !state.layers.realized) return false;
      if (o.kind === 'lead' && (!state.layers.leads || !state.temps[o.leadTemp])) return false;
      if (q) {
        const hay = (o.name + ' ' + o.phone + ' ' + o.settlement).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      if (state.filters.region && o.region !== state.filters.region) return false;
      if (state.filters.district && o.district !== state.filters.district) return false;
      if (state.filters.settlement && o.settlement !== state.filters.settlement) return false;
      if (state.filters.clientType && o.clientType !== state.filters.clientType) return false;
      if (state.filters.leadSource && o.leadSource !== state.filters.leadSource) return false;
      if (state.filters.regManager && o.regionalManager !== state.filters.regManager) return false;
      if (state.filters.salesManager && o.salesManager !== state.filters.salesManager) return false;
      if (state.filters.stationType && o.stationType !== state.filters.stationType) return false;
      if (state.filters.status && o.status !== state.filters.status) return false;
      if (pmin !== null && o.powerKw < pmin) return false;
      if (pmax !== null && o.powerKw > pmax) return false;
      return true;
    });
  }

  function render() {
    const filtered = getFiltered();
    
    document.getElementById('cnt-realized').innerText = allData.filter(o => o.kind === 'realized').length;
    document.getElementById('cnt-leads').innerText = allData.filter(o => o.kind === 'lead').length;
    document.getElementById('items-counter').innerText = `${filtered.length} зі ${allData.length}`;

    cRealized.clearLayers(); cLeads.clearLayers();
    filtered.forEach(o => {
      const active = o.id === state.activeId;
      const color = o.kind === 'lead' ? COLORS[o.leadTemp] : COLORS.realized;
      const size = active ? 24 : 15;
      
      const alertHtml = o.isOverdue ? `<span style="position:absolute;inset:-3px;border-radius:50%;border:2px solid #ef4444;animation:taskBlink 1s infinite alternate"></span>` : '';
      const html = `<div style="position:relative;width:${size}px;height:${size}px">${active ? `<span style="position:absolute;left:50%;top:50%;width:${size}px;height:${size}px;margin:-${size / 2}px 0 0 -${size / 2}px;border-radius:50%;background:${color};animation:seppulse 1.6s ease-out infinite"></span>` : ''}<span style="position:absolute;inset:0;border-radius:50%;background:${color};border:${active ? 3 : 2.5}px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45)"></span>${alertHtml}</div>`;
      
      const mk = L.marker([o.lat, o.lon], { icon: L.divIcon({ html, className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2] }), zIndexOffset: active ? 1000 : 0 });
      mk.bindTooltip(`<b>${o.name}</b><br>${o.settlement} · ${o.powerKw} кВт`, { className: 'ses-tt', direction: 'top', offset: [0, -size / 2] });
      
      mk.on('click', () => { selectObject(o.id); });
      (o.kind === 'lead' ? cLeads : cRealized).addLayer(mk);
    });

    const listCont = document.getElementById('object-list');
    if (filtered.length === 0) {
      listCont.innerHTML = `<div style="padding:30px 16px;text-align:center;color:#9aa29a;font-size:13px">Нічого не знайдено</div>`;
    } else {
      let html = '';
      filtered.sort((a,b) => b.powerKw - a.powerKw).forEach(o => {
        const isA = o.id === state.activeId;
        const color = o.kind === 'lead' ? COLORS[o.leadTemp] : COLORS.realized;
        html += `
          <button type="button" onclick="selectObject('${o.id}')" style="display:flex;gap:11px;width:100%;padding:11px;cursor:pointer;border:1px solid ${isA ? color : 'transparent'};background:${isA ? '#f4f9f6' : 'transparent'};border-radius:11px;font:inherit;color:inherit;align-items:flex-start;margin-bottom:4px;text-align:left;">
            <span style="flex-shrink:0;width:11px;height:11px;border-radius:50%;background:${color};marginTop:3px;box-shadow:0 0 0 1px #cdd3cc"></span>
            <span style="display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;">
              <span style="font-size:13px;font-weight:600;color:#1c2420;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.name}</span>
              <span style="font-size:11.5px;color:#788078">${o.settlement} ${o.region ? ', ' + o.region : ''}</span>
              <span style="display:flex;align-items:center;gap:7px;margin-top:2px">
                <span style="font-size:11px;font-weight:600;">${o.powerKw} кВт</span>
                <span style="font-size:10.5px;padding:2px 7px;border-radius:6px;background:#f0f2ee;">${o.status}</span>
              </span>
              ${o.isOverdue ? `<span style="font-size:10.5px;color:#ef4444;font-weight:600;margin-top:2px;">⚠️ Увага (прострочено)</span>` : ''}
            </span>
          </button>
        `;
      });
      listCont.innerHTML = html;
    }

    updateCard();
    updateAnalyticsPanel();
  }

  function selectObject(id) {
    state.activeId = id;
    render();
    const o = allData.find(x => x.id === id);
    if (o) map.flyTo([o.lat, o.lon], Math.max(map.zoom || 12, 12), { duration: 0.5 });
  }

  function updateCard() {
    const card = document.getElementById('details-card');
    const ao = allData.find(x => x.id === state.activeId);
    if (!ao) { card.style.display = 'none'; return; }

    card.style.display = 'flex';
    const color = ao.kind === 'lead' ? COLORS[ao.leadTemp] : COLORS.realized;
    const money = ao.contractSum ? new Intl.NumberFormat('uk-UA').format(ao.contractSum) + ' грн' : '—';

    card.innerHTML = `
      <div style="padding:18px 20px;background:${color};color:#fff;flex-shrink:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
          <div style="display:flex;flex-direction:column;gap:5px">
            <span style="font-size:10.5px;text-transform:uppercase;opacity:.85">${ao.kind === 'lead' ? 'Потенційний лід' : 'Реалізований об’єкт'}</span>
            <span style="font-size:18px;font-weight:700;line-height:1.2">${ao.name}</span>
          </div>
          <button type="button" onclick="closeCard()" style="width:30px;height:30px;border-radius:8px;border:0;background:rgba(255,255,255,.18);color:#fff;font-size:17px;cursor:pointer;">✕</button>
        </div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-top:13px">
          <span style="font-size:27px;font-weight:800;line-height:1;">${ao.powerKw}</span>
          <span style="font-size:13px;opacity:.9">кВт · ${ao.stationType || 'СЕС'}</span>
        </div>
      </div>
      <div style="flex:1;min-height:0;overflow-y:auto;padding:6px 20px 22px">
        ${ao.isOverdue ? `<div style="margin-top:10px;padding:10px;background:#fef2f2;border:1px solid #f87171;border-radius:8px;color:#b91c1c;font-size:12.5px;font-weight:600;">⚠️ Прострочена задача або відсутня активність!</div>` : ''}
        <div style="display:flex;flex-direction:column;font-size:13px;">
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2ee;"><b>Контакт:</b> <span>${ao.contact}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2ee;"><b>Телефон:</b> <span>${ao.phone || '—'}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2ee;"><b>Локація:</b> <span>${ao.settlement}, ${ao.region}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2ee;"><b>Менеджер:</b> <span>${ao.salesManager || '—'}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2ee;"><b>Статус:</b> <span>${ao.status}</span></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2ee;"><b>Сума договору:</b> <span>${money}</span></div>
        </div>
        ${ao.notes ? `<div style="margin-top:14px;padding:13px 15px;background:#f6f7f5;border-radius:11px;"><div style="font-size:10.5px;color:#8a938b;font-weight:600;margin-bottom:6px">Примітки</div><div style="font-size:13px;color:#3a423b">${ao.notes}</div></div>` : ''}
        <div style="display:flex;gap:10px;margin-top:16px;">
          <a href="tel:${ao.phone}" style="flex:1;display:flex;align-items:center;justify-content:center;padding:12px;border-radius:11px;background:#1f8a5b;color:#fff;text-decoration:none;font-weight:600;font-size:14px">☎ Дзвінок</a>
          ${ao.crmLink ? `<a href="${ao.crmLink}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;padding:12px;border-radius:11px;background:#e8f3ee;color:#1f8a5b;border:1px solid #1f8a5b;text-decoration:none;font-weight:600;font-size:14px">В CRM ↗</a>` : ''}
        </div>
      </div>
    `;
  }

  function updateAnalyticsPanel() {
    const pan = document.getElementById('analytics-panel');
    if (!state.showAnalytics) { pan.style.display = 'none'; return; }
    pan.style.display = 'flex';

    const filtered = getFiltered();
    const totalPower = filtered.reduce((acc, o) => acc + (o.kind === 'realized' ? o.powerKw : 0), 0);
    const overdueCount = filtered.filter(o => o.isOverdue).length;

    pan.innerHTML = `
      <div style="padding:18px 20px;background:#1c2420;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:18px;font-weight:700;">Аналітика</span>
        <button type="button" onclick="toggleAnalytics()" style="width:30px;height:30px;border-radius:8px;border:0;background:rgba(255,255,255,.18);color:#fff;font-size:17px;cursor:pointer;">✕</button>
      </div>
      <div style="flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;">
        <div style="padding:15px;background:#f4f5f3;border-radius:10px;">
          <div style="font-size:11px;color:#687069;text-transform:uppercase;">Встановлена потужність СЕС</div>
          <div style="font-size:24px;font-weight:800;color:#1f8a5b;">${totalPower.toFixed(1)} кВт</div>
        </div>
        <div style="padding:15px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;">
          <div style="font-size:11px;color:#dc2626;text-transform:uppercase;">Прострочених задач</div>
          <div style="font-size:24px;font-weight:800;color:#b91c1c;">${overdueCount}</div>
        </div>
      </div>
    `;
  }

  function toggleLayer(l) { state.layers[l] = !state.layers[l]; updateButtonStyles(); render(); }
  function toggleTemp(t) { state.temps[t] = !state.temps[t]; updateButtonStyles(); render(); }
  function setFilter(k, v) { state.filters[k] = v; render(); }
  function onSearchChange(v) { state.search = v; render(); }
  function closeCard() { state.activeId = null; render(); }
  function toggleAnalytics() { state.showAnalytics = !state.showAnalytics; render(); }
  
  function toggleFiltersPanel() {
    const p = document.getElementById('filters-panel');
    const chev = document.getElementById('filter-chevron');
    state.showFilters = !state.showFilters;
    p.style.display = state.showFilters ? 'flex' : 'none';
    chev.innerText = state.showFilters ? '▾' : '▸';
  }

  function resetAllFilters() {
    document.getElementById('search-input').value = '';
    const selects = document.querySelectorAll('.filter-select');
    selects.forEach(s => s.value = '');
    document.getElementById('f-powerMin').value = '';
    document.getElementById('f-powerMax').value = '';
    
    state.search = '';
    for (let k in state.filters) state.filters[k] = '';
    render();
  }

  function connectSheet() {
    const cur = localStorage.getItem('ses_gsheet_url') || '';
    const u = window.prompt('Вставте посилання на Google Таблицю', cur);
    if (u === null) return;
    if (u.trim()) localStorage.setItem('ses_gsheet_url', u.trim()); else localStorage.removeItem('ses_gsheet_url');
    loadData();
  }

  function updateButtonStyles() {
    const check = (id, active, actBg, actBorder) => {
      const el = document.getElementById(id);
      if (active) {
        el.style.background = actBg; el.style.borderColor = actBorder; el.style.color = '#1c2420';
      } else {
        el.style.background = '#f4f5f3'; el.style.borderColor = '#e9ebe7'; el.style.color = '#9aa29a';
      }
    };
    check('layer-realized', state.layers.realized, '#e8f3ee', '#1f8a5b');
    check('layer-leads', state.layers.leads, '#fdf3e6', '#e0871e');
    check('temp-warm', state.layers.leads && state.temps.warm, '#fdf3e6', '#e0871e');
    check('temp-cold', state.layers.leads && state.temps.cold, '#ebf2fc', '#3a78d6');
    check('temp-raw', state.layers.leads && state.temps.raw, '#f3f3f2', '#8a8079');
  }
</script>
</body>
</html>
