document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags вЂ” manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin вЂ” blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec вЂ” re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\n\n  clusterIcon(color) {\n    return (cluster) => {\n      const n = cluster.getChildCount();\n      const s = n < 10 ? 34 : n < 50 ? 42 : 50;\n      return window.L.divIcon({\n        html: `<div class=\"ses-cluster\" style=\"width:${s}px;height:${s}px;background:${color};font-size:${n < 100 ? 14 : 12}px\">${n}<\u002Fdiv>`,\n        className: '', iconSize: [s, s]\n      });\n    };\n  }\n\n  async loadData(silent) {\n    if (!Object.keys(this.geoSeed).length) {\n      const dd = window.__SES_DATA || {};\n      [].concat(dd.realized || [], dd.leads || []).forEach(o => {\n        if (o.lat && o.lon) { this.geoSeed[o.address] = [o.lat, o.lon]; this.geoSeed[o.settlement + '|' + o.region] = [o.lat, o.lon]; }\n      });\n    }\n    const url = (localStorage.getItem('ses_gsheet_url') || this.SHEET_DEFAULT || '').trim();\n    if (url) {\n      try {\n        const arr = await this.fetchSheet(url);\n        if (arr && arr.length) {\n          this.all = arr;\n          this.setState({ ready: true, source: 'gsheet', lastSync: new Date() });\n          this.syncMarkers(); this.startAutoRefresh(); return;\n        }\n      } catch (e) { console.warn('Google Sheets РЅРµРґРѕСЃС‚СѓРїРЅР°, РїРѕРєР°Р·Р°РЅРѕ РґРµРјРѕ-РґР°РЅС–', e); }\n    }\n    if (silent) return;\n    const d = window.__SES_DATA || { realized: [], leads: [] };\n    this.all = [].concat(d.realized || [], d.leads || []);\n    this.setState({ ready: true, source: 'demo' });\n    this.syncMarkers();\n  }\n\n  startAutoRefresh() {\n    if (this._refresh) return;\n    this._refresh = setInterval(() => { if (this.state.source === 'gsheet') this.loadData(true); }, 5 * 60 * 1000);\n  }\n\n  // Parse a published Google Sheet CSV into objects. Expected headers (UA), lat/lon optional.\n  async fetchSheet(url) {\n    let csvUrl = url;\n    const m = url.match(/\\/spreadsheets\\/d\\/([\\w-]+)/);\n    if (m) { const gid = (url.match(/[?&#]gid=(\\d+)/) || [])[1]; csvUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv` + (gid ? `&gid=${gid}` : ''); }\n    const res = await fetch(csvUrl);\n    const text = await res.text();\n    const rows = this.parseCSV(text);\n    if (rows.length < 2) return [];\n    const head = rows[0].map(h => h.trim().toLowerCase());\n    const col = (...names) => { for (const n of names) { const i = head.findIndex(h => h.includes(n)); if (i >= 0) return i; } return -1; };\n    const ci = {\n      name: col('СЃСѓР±', 'РЅР°Р·РІР° РєР»С–С”РЅС‚', 'РЅР°Р·РІР°', 'РїРѕРєСѓРїРµС†СЊ', 'РєРѕРјРїР°РЅ'),\n      contact: col('РїРѕРєСѓРїРµС†СЊ', 'РєРѕРЅС‚Р°РєС‚', 'РІР»Р°СЃРЅРёРє'), phone: col('С‚РµР»РµС„РѕРЅ', 'С‚РµР»'),\n      settlement: col('РЅР°СЃРµР»РµРЅ'), region: col('СЂРµРіС–РѕРЅ', 'РѕР±Р»Р°СЃС‚'), district: col('СЂР°Р№РѕРЅ'),\n      address: col('Р°РґСЂРµСЃ'), power: col('РїРѕС‚СѓР¶РЅ'), type: col('С‚РёРї СЃС‚Р°РЅС†', 'С‚РёРї СЃРµСЃ'),\n      sale: col('РґР°С‚Р° РїСЂРѕРґ', 'РїСЂРѕРґР°Р¶'), inst: col('РґР°С‚Р° РјРѕРЅС‚Р°Р¶', 'РјРѕРЅС‚Р°Р¶'),\n      reg: col('СЂРµРіС–РѕРЅР°Р»СЊРЅ'), sales: col('РјРµРЅРµРґР¶РµСЂ РїСЂРѕРґ', 'РјРµРЅРµРґР¶РµСЂ Р· РїСЂРѕРґР°Р¶'),\n      status: col('СЃС‚Р°С‚СѓСЃ РїСЂРѕС”РєС‚', 'СЃС‚Р°С‚СѓСЃ РїСЂРѕРµРєС‚', 'СЃС‚Р°С‚СѓСЃ СЃРµСЃ'), sum: col('СЃСѓРјР°'), notes: col('РїСЂРёРјС–С‚'),\n      base: col('Р±Р°Р·Р°', 'С€Р°СЂ'), temp: col('С‚РµРјРїРµСЂ', 'Р»С–Рґ С‚РёРї', 'С‚РёРї Р»С–РґР°'),\n      lat: col('С€РёСЂРѕС‚', 'lat'), lon: col('РґРѕРІРіРѕС‚', 'lon', 'lng')\n    };\n    const out = [];\n    for (let r = 1; r < rows.length; r++) {\n      const c = rows[r]; if (!c || !c[ci.name]) continue;\n      const baseVal = (ci.base >= 0 ? c[ci.base] : '').toLowerCase();\n      const tempVal = (ci.temp >= 0 ? c[ci.temp] : '').toLowerCase();\n      const isLead = baseVal.includes('РїРѕС‚РµРЅС†') || baseVal.includes('Р»С–Рґ') || tempVal.includes('С…РѕР»') || tempVal.includes('С‚РµРїР»') || tempVal.includes('РЅРµРѕР±СЂРѕР±');\n      let leadTemp = '';\n      if (isLead) leadTemp = tempVal.includes('С‚РµРїР»') ? 'warm' : tempVal.includes('С…РѕР»') ? 'cold' : 'raw';\n      const o = {\n        id: (isLead ? 'L' : 'R') + r,\n        kind: isLead ? 'lead' : 'realized', leadTemp,\n        name: c[ci.name] || '', contact: ci.contact >= 0 ? c[ci.contact] : 'вЂ”',\n        phone: ci.phone >= 0 ? c[ci.phone] : '', settlement: ci.settlement >= 0 ? c[ci.settlement] : '',\n        region: ci.region >= 0 ? c[ci.region] : '', district: ci.district >= 0 ? c[ci.district] : '',\n        address: ci.address >= 0 ? c[ci.address] : '', powerKw: parseFloat((ci.power >= 0 ? c[ci.power] : '0').replace(/[^\\d.]/g, '')) || 0,\n        stationType: ci.type >= 0 ? c[ci.type] : '', saleDate: ci.sale >= 0 ? c[ci.sale] : '',\n        installDate: ci.inst >= 0 ? c[ci.inst] : '', regionalManager: ci.reg >= 0 ? c[ci.reg] : '',\n        salesManager: ci.sales >= 0 ? c[ci.sales] : '', status: ci.status >= 0 ? c[ci.status] : (isLead ? 'Р›С–Рґ' : 'Р РµР°Р»С–Р·РѕРІР°РЅРѕ'),\n        contractSum: parseFloat((ci.sum >= 0 ? c[ci.sum] : '0').replace(/[^\\d.]/g, '')) || 0,\n        notes: ci.notes >= 0 ? c[ci.notes] : '',\n        lat: ci.lat >= 0 ? parseFloat(String(c[ci.lat]).replace(',', '.')) : null,\n        lon: ci.lon >= 0 ? parseFloat(String(c[ci.lon]).replace(',', '.')) : null\n      };\n      out.push(o);\n    }\n    // geocode rows missing coordinates (best-effort, cached)\n    const cache = JSON.parse(localStorage.getItem('ses_geo') || '{}');\n    const seed = this.geoSeed || {};\n    for (const o of out) {\n      if ((!o.lat || !o.lon) && (o.address || o.settlement)) {\n        const skey = o.settlement + '|' + o.region;\n        if (seed[o.address]) { o.lat = seed[o.address][0]; o.lon = seed[o.address][1]; continue; }\n        if (seed[skey]) { o.lat = seed[skey][0]; o.lon = seed[skey][1]; continue; }\n        const q = o.address || (o.settlement + ', ' + o.region);\n        if (cache[q]) { o.lat = cache[q][0]; o.lon = cache[q][1]; continue; }\n        try {\n          const g = await fetch('https://nominatim.openstreetmap.org/se n    this.setState({ ready: false, activeId: null });\n    this.loadData();\n  }\n\n  // ---- filtering ----\n  yearOf(o) { return (o.installDate || o.saleDate || '').slice(0, 4); }\n  getFiltered() {\n    const s = this.state, f = s.filters;\n    const q = s.search.trim().toLowerCase();\n    const pmin = f.powerMin ? +f.powerMin : null, pmax = f.powerMax ? +f.powerMax : null;\n    const yf = f.yearFrom ? +f.yearFrom : null, yt = f.yearTo ? +f.yearTo : null;\n    return this.all.filter(o => {\n      if (o.kind === 'realized' && !s.layers.realized) return false;\n      if (o.kind === 'lead' && (!s.layers.leads || !s.temps[o.leadTemp])) return false;\n      if (q) { const hay = (o.name + ' ' + o.phone + ' ' + o.settlement).toLowerCase().replace(/[()\\s]/g, ''); if (!hay.includes(q.replace(/[()\\s]/g, ''))) return false; }\n      if (f.region && o.region !== f.region) return false;\n      if (f.settlement && o.settlement !== f.settlement) return false;\n      if (f.regManager && o.regionalManager !== f.regManager) return false;\n      if (f.salesManager && o.salesManager !== f.salesManager) return false;\n      if (f.stationType && o.stationType !== f.stationType) return false;\n      if (f.status && o.status !== f.status) return false;\n      if (pmin !== null && o.powerKw < pmin) return false;\n      if (pmax !== null && o.powerKw > pmax) return false;\n      if (yf !== null || yt !== null) { const y = +this.yearOf(o); if (!y) return false; if (yf !== null && y < yf) return false; if (yt !== null && y > yt) return false; }\n      return true;\n    });\n  }\n\n  colorOf(o) { return o.kind === 'lead' ? this.COLORS[o.leadTemp] : this.COLORS.realized; }\n\n  syncMarkers() {\n    if (!this.cRealized) return;\n    const L = window.L;\n    this.cRealized.clearLayers(); this.cLeads.clearLayers();\n    this._markers = {};\n    const filtered = this.getFiltered();\n    filtered.forEach(o => {\n      if (!o.lat || !o.lon) return;\n      const active = o.id === this.state.activeId;\n      const color = this.colorOf(o);\n      const size = active ? 24 : 15;\n      const html = `<div style=\"position:relative;width:${size}px;height:${size}px\">${active ? `<span style=\"position:absolute;left:50%;top:50%;width:${size}px;height:${size}px;margin:-${size / 2}px 0 0 -${size / 2}px;border-radius:50%;background:${color};animation:seppulse 1.6s ease-out infinite\"><\u002Fspan>` : ''}<span style=\"position:absolute;inset:0;border-radius:50%;background:${color};border:${active ? 3 : 2.5}px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45)\"><\u002Fspan><\u002Fdiv>`;\n      const mk = L.marker([o.lat, o.lon], { icon: L.divIcon({ html, className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2] }), zIndexOffset: active ? 1000 : 0 });\n      const tip = `<b>${o.name}<\u002Fb><br>${o.settlement || ''}${o.settlement ? ' В· ' : ''}${o.powerKw} РєР’С‚${o.kind === 'lead' ? '<br><span style=\"opacity:.8\">' + o.status + '<\u002Fspan>' : ''}`;\n      mk.bindTooltip(tip, { className: 'ses-tt', direction: 'top', offset: [0, -size / 2] });\n      mk.on('click', () => this.setState({ activeId: o.id }));\n      (o.kind === 'lead' ? this.cLeads : this.cRealized).addLayer(mk);\n    });\n  }\n\n  componentDidUpdate(pp, ps) {\n    if (ps.search !== this.state.search || ps.filters !== this.state.filters ||\n        ps.layers !== this.state.layers || ps.temps !== this.state.temps ||\n        ps.activeId !== this.state.activeId || ps.ready !== this.state.ready) {\n      this.syncMarkers();\n    }\n    if (ps.activeId !== this.state.activeId && this.state.activeId && this.map) {\n      const o = this.all.find(x => x.id === this.state.activeId);\n      if (o && o.lat) this.map.flyTo([o.lat, o.lon], Math.max(this.map.getZoom(), 11), { duration: .6 });\n    }\n  }\n\n  // ---- handlers ----\n  setFilter(k, v) { this.setState(s => ({ filters: { ...s.filters, [k]: v }, activeId: null })); }\n  toggleLayerKey(k) { this.setState(s => ({ layers: { ...s.layers, [k]: !s.layers[k] } })); }\n  toggleTempKey(k) { this.setState(s => ({ temps: { ...s.temps, [k]: !s.temps[k] } })); }\n  resetFilters() { this.setState({ search: '', filters: { region: '', settlement: '', regManager: '', salesManager: '', stationType: '', status: '', powerMin: '', powerMax: '', yearFrom: '', yearTo: '' } }); }\n\n  uniq(key, pred) { const set = new Set(); this.all.forEach(o => { if ((!pred || pred(o)) && o[key]) set.add(o[key]); }); return [...set].sort((a, b) => a.localeCompare(b, 'uk')); }\n  money(n) { return n ? new Intl.NumberFormat('uk-UA').format(n) + ' РіСЂРЅ' : 'вЂ”'; }\n\n  renderVals() {\n    const s = this.state, f = s.filters, C = this.COLORS;\n    const ready = s.ready;\n    const filtered = ready ? this.getFiltered() : [];\n    const cRealized = filtered.filter(o => o.kind === 'realized').length;\n    const cLeads = filtered.filter(o => o.kind === 'lead').length;\n\n    const sorted = [...filtered].sort((a, b) =>\n      (a.kind === b.kind ? 0 : a.kind === 'realized' ? -1 : 1) || (b.powerKw - a.powerKw));\n\n    const badge = (txt, color) => ({\n      fontSize: '10.5px', fontWeight: 600, padding: '2px 7px', borderRadius: '6px',\n      background: `color-mix(in oklab, ${color} 15%, #fff)`, color: `color-mix(in oklab, ${color} 75%, #1c2420)`\n    });\n\n    const listView = sorted.map(o => {\n      const color = this.colorOf(o); const isA = o.id === s.activeId;\n      return {\n        name: o.name, place: [o.settlement, o.region].filter(Boolean).join(', '),\n        power: o.powerKw + ' РєР’С‚', status: o.status,\n        onSelect: () => this.setState({ activeId: o.id }),\n        onHover: () => {},\n        dot: { flexShrink: 0, width: '11px', height: '11px', borderRadius: '50%', background: color, marginTop: '3px', boxShadow: '0 0 0 1px #cdd3cc' },\n        badge: badge(o.status, color),\n        style: {\n          display: 'flex', gap: '11px', width: '100%', padding: '11px 11px', cursor: 'pointer',\n          border: '1px solid ' + (isA ? 'color-mix(in oklab, ' + color + ' 45%, #e3e6e1)' : 'transparent'),\n          background: isA ? 'color-mix(in oklab, ' + color + ' 7%, #fff)' : 'transparent',\n          borderRadius: '11px', font: 'inherit', color: 'inherit', alignItems: 'flex-start',\n          transition: 'background .12s, border-color .12s'\n        }\n      };\n    });\n\n    const opt = (arr, allLabel) => [{ v: '', label: allLabel }].concat(arr.map(x => ({ v: x, label: x })));\n    const settleSrc = f.region ? this.uniq('settlement', o => o.region === f.region) : this.uniq('settlement');\n    const mk = (key, label, options) => ({ key, label, value: f[key], options, onChange: (e) => this.setFilter(key, e.target.value) });\n    const filterControls = ready ? [\n      mk('region', 'РћР±Р»Р°СЃС‚СЊ', opt(this.uniq('region'), 'РЈСЃС– РѕР±Р»Р°СЃС‚С–')),\n      mk('settlement', 'РќР°СЃРµР»РµРЅРёР№ РїСѓРЅРєС‚', opt(settleSrc, 'РЈСЃС– РїСѓРЅРєС‚Рё')),\n      mk('regManager', 'Р РµРіС–РѕРЅР°Р»СЊРЅРёР№ РјРµРЅРµРґР¶РµСЂ', opt(this.uniq('regionalManager'), 'РЈСЃС–')),\n      mk('salesManager', 'РњРµРЅРµРґР¶РµСЂ РїСЂРѕРґР°Р¶Сѓ', opt(this.uniq('salesManager'), 'РЈСЃС–')),\n      mk('stationType', 'РўРёРї СЃС‚Р°РЅС†С–С—', opt(this.uniq('stationType'), 'РЈСЃС– С‚РёРїРё')),\n      mk('status', 'РЎС‚Р°С‚СѓСЃ', opt(this.uniq('status'), 'РЈСЃС– СЃС‚Р°С‚СѓСЃРё')),\n    ] : [];\n\n    const chip = (on, c) => ({\n      display: 'flex', alignItems: 'center', gap: '7px', padding: '7px 12px', borderRadius: '9px',\n      border: '1px solid ' + (on ? 'color-mix(in oklab, ' + c + ' 40%, #e3e6e1)' : '#e9ebe7'),\n      background: on ? 'color-mix(in oklab, ' + c + ' 9%, #fff)' : '#f4f5f3',\n      color: on ? '#1c2420' : '#9aa29a', font: 'inherit', fontSize: '12.5px', fontWeight: 600,\n      cursor: 'pointer', opacity: on ? 1 : .7\n    });\n    const tempMeta = [['warm', 'РўРµРїР»С–', C.warm], ['cold', 'РҐРѕР»РѕРґРЅС–', C.cold], ['raw', 'РќРµРѕР±СЂРѕР±Р»РµРЅС–', C.raw]];\n    const tempChips = tempMeta.map(([k, label, color]) => ({\n      label, color, onToggle: () => this.toggleTempKey(k),\n      style: { ...chip(s.layers.leads && s.temps[k], color), padding: '6px 10px', fontSize: '11.5px', fontWeight: 500 }\n    }));\n\n    let card = null;\n    const ao = ready ? this.all.find(o => o.id === s.activeId) : null;\n    if (ao) {\n      const color = this.colorOf(ao);\n      const rows = [\n        ['РљРѕРЅС‚Р°РєС‚РЅР° РѕСЃРѕР±Р°', ao.contact || 'вЂ”'],\n        ['РќР°СЃРµР»РµРЅРёР№ РїСѓРЅРєС‚', ao.settlement || 'вЂ”'],\n        ['РћР±Р»Р°СЃС‚СЊ', ao.region || 'вЂ”'],\n        ['РђРґСЂРµСЃР°', ao.address || 'вЂ”'],\n        ['РўРёРї СЃС‚Р°РЅС†С–С—', ao.stationType || 'вЂ”'],\n        ['РЎС‚Р°С‚СѓСЃ РїСЂРѕС”РєС‚Сѓ', ao.status || 'вЂ”'],\n        ['Р”Р°С‚Р° РїСЂРѕРґР°Р¶Сѓ', ao.saleDate || 'вЂ”'],\n        ['Р”Р°С‚Р° РјРѕРЅС‚Р°Р¶Сѓ', ao.installDate || 'вЂ”'],\n        ['Р РµРіС–РѕРЅР°Р»СЊРЅРёР№ РјРµРЅРµРґР¶РµСЂ', ao.regionalManager || 'вЂ”'],\n        ['РњРµРЅРµРґР¶РµСЂ РїСЂРѕРґР°Р¶Сѓ', ao.salesManager || 'вЂ”'],\n        ['РЎСѓРјР° РґРѕРіРѕРІРѕСЂСѓ', this.money(ao.contractSum)],\n      ].map(([k, v]) => ({ k, v }));\n      card = {\n        name: ao.name, kindLabel: ao.kind === 'lead' ? 'РџРѕС‚РµРЅС†С–Р№РЅРёР№ РєР»С–С”РЅС‚ В· ' + ao.status : 'Р РµР°Р»С–Р·РѕРІР°РЅРёР№ РѕР±вЂ™С”РєС‚',\n        power: ao.powerKw, stationType: ao.stationType, headBg: color, rows,\n        notes: ao.notes || '', phone: ao.phone || 'вЂ”', phoneHref: 'tel:' + (ao.phone || '').replace(/[^\\d+]/g, '')\n      };\n    }\n\n    const srcDemo = s.source === 'demo';\n    return {\n      ready, search: s.search,\n      onSearch: (e) => this.setState({ search: e.target.value, activeId: null }),\n      showFilters: s.showFilters, toggleFilters: () => this.setState(x => ({ showFilters: !x.showFilters })),\n      filterChevron: s.showFilters ? 'в–ѕ' : 'в–ё',\n      resetFilters: () => this.resetFilters(),\n      filterControls,\n      powerMin: f.powerMin, powerMax: f.powerMax, yearFrom: f.yearFrom, yearTo: f.yearTo,\n      onPowerMin: (e) => this.setFilter('powerMin', e.target.value.replace(/[^\\d]/g, '')),\n      onPowerMax: (e) => this.setFilter('powerMax', e.target.value.replace(/[^\\d]/g, '')),\n      onYearFrom: (e) => this.setFilter('yearFrom', e.target.value.replace(/[^\\d]/g, '')),\n      onYearTo: (e) => this.setFilter('yearTo', e.target.value.replace(/[^\\d]/g, '')),\n      cRealized, cLeads,\n      chipRealized: chip(s.layers.realized, C.realized),\n      chipLeads: chip(s.layers.leads, C.warm),\n      toggleRealized: () => this.toggleLayerKey('realized'),\n      toggleLeads: () => this.toggleLayerKey('leads'),\n      tempChips,\n      listView, isEmpty: ready && sorted.length === 0,\n      shownCount: filtered.length, totalCount: this.all.length,\n      mapRef: this.mapRef,\n      card, closeCard: () => this.setState({ activeId: null }),\n      connectSheet: () => this.connectSheet(),\n      srcLabel: srcDemo ? 'Р”РµРјРѕ-РґР°РЅС–' : ('Google Sheets' + (s.lastSync ? ' В· ' + String(s.lastSync.getHours()).padStart(2, '0') + ':' + String(s.lastSync.getMinutes()).padStart(2, '0') : '')), srcColor: srcDemo ? '#c9a227' : '#1f8a5b'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
